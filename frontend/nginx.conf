# ==============================================================================
# FRONTEND INTERNAL NGINX CONFIGURATION - SOCIAL PRIVACY DETECTOR (SDCC)
# Serves static React files compiled by Vite on port 3000
# ==============================================================================

server {
    listen 3000;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # SPA routing support: fallback to index.html for virtual routes
        try_files $uri $uri/ /index.html;
    }

    # Custom error page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
