# ==============================================================================
# CI/CD Pipeline - Social Privacy Detector (SDCC)
# Build Docker images, push to Amazon ECR, deploy to EC2 via SSH
# ==============================================================================

name: Build & Deploy to AWS

on:
  push:
    branches: [main]

env:
  # us-east-1: stessa regione dei servizi AWS del progetto (Comprehend,
  # Textract, DynamoDB, S3). ECR ed EC2 devono stare qui per coerenza.
  AWS_REGION: us-east-1
  ECR_FRONTEND: social-privacy-frontend
  ECR_BACKEND: social-privacy-backend
  ECR_LAMBDA: spd-lambda

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Permessi per l'autenticazione OIDC: id-token=write permette a GitHub di
    # emettere il token OIDC che AWS scambia con credenziali temporanee del ruolo
    # (niente chiavi AWS long-lived nei secret). contents=read per il checkout.
    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Checkout del codice sorgente
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Autenticazione AWS via OIDC (OpenID Connect): nessuna chiave statica.
      # GitHub presenta un token OIDC firmato, AWS lo verifica e assume il ruolo
      # AWS_DEPLOY_ROLE_ARN restituendo credenziali TEMPORANEE. Piu' sicuro delle
      # access key permanenti (che se trafugate restano valide finche' non revocate).
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-spd-deploy
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login ad Amazon ECR
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build e Push immagine Frontend
      - name: Build & Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_FRONTEND:latest -t $ECR_REGISTRY/$ECR_FRONTEND:${{ github.sha }} ./frontend
          docker push $ECR_REGISTRY/$ECR_FRONTEND:latest
          docker push $ECR_REGISTRY/$ECR_FRONTEND:${{ github.sha }}

      # 5. Build e Push immagine Backend
      - name: Build & Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND:latest -t $ECR_REGISTRY/$ECR_BACKEND:${{ github.sha }} ./backend
          docker push $ECR_REGISTRY/$ECR_BACKEND:latest
          docker push $ECR_REGISTRY/$ECR_BACKEND:${{ github.sha }}

      # 5b. Build e Push immagine Lambda (consumatore SQS, WORKER_MODE=sqs).
      # Stesso codice backend, entrypoint diverso (Dockerfile.lambda). Serve un
      # repo ECR "spd-lambda" gia' creato.
      - name: Build & Push Lambda Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -f ./backend/Dockerfile.lambda -t $ECR_REGISTRY/$ECR_LAMBDA:latest -t $ECR_REGISTRY/$ECR_LAMBDA:${{ github.sha }} ./backend
          docker push $ECR_REGISTRY/$ECR_LAMBDA:latest
          docker push $ECR_REGISTRY/$ECR_LAMBDA:${{ github.sha }}

      # 5c. Aggiorna il codice della Lambda con la nuova immagine.
      # "|| true": al primo run (prima che lo stack CloudFormation crei la
      # funzione SpdWorker) il comando fallirebbe; lo si ignora per non rompere
      # la pipeline. Dai run successivi aggiorna davvero la funzione.
      - name: Update Lambda function code
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          aws lambda update-function-code --function-name SpdWorker \
            --image-uri $ECR_REGISTRY/$ECR_LAMBDA:${{ github.sha }} \
            --region $AWS_REGION || true

      # 6. Deploy su EC2 via SSH
      - name: Deploy to EC2 Instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login ad ECR dall'EC2
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}

            # Aggiorna e riavvia i container. La cartella /home/ec2-user/app deve
            # contenere: docker-compose.prod.yml, nginx.conf, .env.production
            # (copiati a mano sull'EC2 durante il setup — NON nel repo).
            cd /home/ec2-user/app
            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            # Fix deploy produzione: avvio col compose di PRODUZIONE (immagini ECR,
            # no bind-mount, no chiavi AWS → IAM role) e --env-file .env.production.
            # Il file .env.production risiede SOLO sull'EC2 (non è nel repo) e
            # contiene la configurazione reale: AWS_MOCK=false e i nomi delle
            # risorse AWS. Senza --env-file il compose userebbe i default.
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

            # Riavvia nginx DOPO il ricreamento di frontend/backend: nginx risolve
            # gli upstream (frontend:3000, backend:8000) all'avvio e ne tiene in
            # cache l'IP; se i container a monte vengono ricreati con nuove immagini,
            # nginx resta con l'IP vecchio e risponde 502 Bad Gateway. Il restart
            # forza la ri-risoluzione DNS verso i container appena creati.
            docker compose -f docker-compose.prod.yml --env-file .env.production restart nginx

            # Pulizia immagini vecchie
            docker image prune -f

            echo "Deploy completato con successo!"
