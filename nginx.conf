# ==============================================================================
# NGINX REVERSE PROXY CONFIGURATION - SOCIAL PRIVACY DETECTOR (SDCC)
# Handles single-entrypoint routing, SPA history mode fallback, and APIs
# ==============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging settings
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Risolutore DNS interno di Docker (127.0.0.11). Serve per risolvere gli
    # hostname degli upstream (backend/frontend) A RUNTIME e non una sola volta
    # all'avvio: quando i container vengono ricreati (es. dopo un rebuild) cambiano
    # IP, e senza questo Nginx continuerebbe a puntare all'IP vecchio restituendo
    # 502 finché non lo si riavvia. Con il resolver + proxy_pass via variabile,
    # Nginx ri-risolve il nome e segue il nuovo IP da solo.
    resolver 127.0.0.11 valid=10s;

    # Limite dimensione richiesta: serve per l'upload immagini dell'endpoint OCR
    # (/api/analyze-image). Il default nginx è 1 MB e bloccherebbe le foto con 413.
    client_max_body_size 10m;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── HTTP → HTTPS ──────────────────────────────────────────────────────────
    # Il blocco su porta 80 non serve più contenuti: redirige tutto a HTTPS così
    # nessun dato sensibile (report PII) viaggia in chiaro. 301 = redirect
    # permanente. $host preserva l'IP/hostname richiesto, $request_uri il path.
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS (TLS termination) ───────────────────────────────────────────────
    # Reverse proxy su 443 con certificato Let's Encrypt (CA pubblica), ottenuto
    # con Certbot sull'host EC2 per il dominio social-privacy-detector.it e montato
    # via volume in /etc/letsencrypt. La cifratura in transito è reale e il
    # certificato è attestato da una CA pubblica: nessun avviso del browser.
    server {
        listen 443 ssl;
        server_name social-privacy-detector.it www.social-privacy-detector.it;

        ssl_certificate     /etc/letsencrypt/live/social-privacy-detector.it/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/social-privacy-detector.it/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;   # niente protocolli TLS obsoleti
        ssl_ciphers         HIGH:!aNULL:!MD5;   # solo cipher forti

        # HSTS: impone al browser di usare sempre HTTPS su questo dominio (canale
        # sicuro forzato). Ha senso solo con un cert di CA pubblica come qui.
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Clickjacking: l'app mostra a una persona i propri dati esposti, quindi un
        # sito terzo non deve poterla incorniciare in un iframe invisibile e indurre
        # click. frame-ancestors è la forma moderna, X-Frame-Options resta per i
        # browser vecchi. L'app non è pensata per essere incorporata: 'none'/DENY.
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        add_header X-Frame-Options "DENY" always;
        # Impedisce al browser di indovinare il tipo di un file ignorando il
        # Content-Type dichiarato (MIME sniffing).
        add_header X-Content-Type-Options "nosniff" always;
        # Non far uscire l'URL completo (che può contenere un ID analisi) verso terzi.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Instradamento delle API al backend FastAPI. L'upstream è in una variabile
        # così Nginx lo risolve a runtime tramite il resolver (vedi sopra): senza URI
        # nel proxy_pass viene inoltrato l'intero request URI (già con prefisso /api/).
        location /api/ {
            set $backend backend:8000;
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Fix stabilità: timeout espliciti verso il backend.
            # Senza questi Nginx usa il default di 60s per ogni fase. Li rendiamo
            # espliciti per chiarezza e per evitare sorprese: il polling usa GET
            # rapide, ma in produzione una chiamata sincrona (es. scraping Apify)
            # potrebbe essere lenta. proxy_read_timeout alto copre quel caso.
            proxy_connect_timeout 10s;   # tempo max per stabilire la connessione al backend
            proxy_send_timeout    30s;   # tempo max per inviare la richiesta al backend
            proxy_read_timeout    60s;   # tempo max di attesa della risposta del backend

            proxy_http_version 1.1;
        }

        # Instradamento del resto al frontend (SPA). Stessa tecnica: upstream in
        # variabile risolto a runtime, request URI inoltrato integralmente.
        location / {
            set $frontend frontend:3000;
            proxy_pass http://$frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPA support fallback (handled inside the frontend Nginx config)
            proxy_intercept_errors on;
            error_page 404 =200 /index.html;
        }

        # Custom error page
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
