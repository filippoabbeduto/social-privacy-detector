# ==============================================================================
# NGINX REVERSE PROXY CONFIGURATION - SOCIAL PRIVACY DETECTOR (SDCC)
# Handles single-entrypoint routing, SPA history mode fallback, and APIs
# ==============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging settings
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── HTTP → HTTPS ──────────────────────────────────────────────────────────
    # Il blocco su porta 80 non serve più contenuti: redirige tutto a HTTPS così
    # nessun dato sensibile (report PII) viaggia in chiaro. 301 = redirect
    # permanente. $host preserva l'IP/hostname richiesto, $request_uri il path.
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS (TLS termination) ───────────────────────────────────────────────
    # Reverse proxy su 443 con certificato self-signed (generato sull'EC2 e
    # montato via volume in /etc/nginx/certs). La cifratura in transito è reale;
    # il browser mostra un avviso solo perché il cert non è firmato da una CA
    # pubblica (in produzione si userebbe ACM/Let's Encrypt con un dominio).
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;   # niente protocolli TLS obsoleti
        ssl_ciphers         HIGH:!aNULL:!MD5;   # solo cipher forti

        # 🚀 Route APIs directly to FastAPI
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Fix stabilità: timeout espliciti verso il backend.
            # Senza questi Nginx usa il default di 60s per ogni fase. Li rendiamo
            # espliciti per chiarezza e per evitare sorprese: il polling usa GET
            # rapide, ma in produzione una chiamata sincrona (es. scraping Apify)
            # potrebbe essere lenta. proxy_read_timeout alto copre quel caso.
            proxy_connect_timeout 10s;   # tempo max per stabilire la connessione al backend
            proxy_send_timeout    30s;   # tempo max per inviare la richiesta al backend
            proxy_read_timeout    60s;   # tempo max di attesa della risposta del backend

            # WebSocket support (for FastAPI websockets if needed later)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # CORS Preflight support (if accessed from different origins directly)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # 🌐 Route SPA files directly to Frontend
        location / {
            proxy_pass http://frontend:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPA support fallback (handled inside the frontend Nginx config)
            proxy_intercept_errors on;
            error_page 404 =200 /index.html;
        }

        # Custom error page
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
